<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的作品</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef3f8;
      --card: rgba(255, 255, 255, 0.92);
      --card-border: rgba(20, 35, 55, 0.08);
      --text: #0f172a;
      --muted: #64748b;
      --shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
      --accent: #2563eb;
      --accent-soft: rgba(37, 99, 235, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "PingFang SC", "Microsoft YaHei", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.95), transparent 34%),
        radial-gradient(circle at 85% 12%, rgba(191, 219, 254, 0.55), transparent 24%),
        radial-gradient(circle at 12% 92%, rgba(226, 232, 240, 0.85), transparent 28%),
        linear-gradient(180deg, #f8fbff 0%, #e9eef5 100%);
      color: var(--text);
    }

    body {
      padding: 28px 24px 40px;
    }

    .page {
      max-width: 1120px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 18px;
      font-size: 28px;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 20px;
    }

    .tab-card {
      position: relative;
      display: flex;
      flex-direction: column;
      min-height: 210px;
      padding: 0;
      border: 1px solid var(--card-border);
      border-radius: 16px;
      overflow: hidden;
      background: var(--card);
      box-shadow: var(--shadow);
      cursor: pointer;
      text-align: left;
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
    }

    .tab-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 22px 48px rgba(15, 23, 42, 0.16);
      border-color: rgba(37, 99, 235, 0.24);
    }

    .tab-preview {
      flex: 1;
      display: grid;
      place-items: center;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.9), rgba(245,247,250,0.94)),
        linear-gradient(135deg, rgba(37, 99, 235, 0.08), rgba(99, 102, 241, 0.04));
      min-height: 150px;
    }

    .preview-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .tab-meta {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 14px 14px;
      border-top: 1px solid rgba(148, 163, 184, 0.16);
      background: rgba(255,255,255,0.75);
    }

    .avatar {
      flex: 0 0 auto;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-size: 16px;
      color: white;
      background: linear-gradient(135deg, #b6bcc7, #9aa5b1);
    }

    .meta-text {
      min-width: 0;
    }

    .meta-title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.35;
      margin: 1px 0 2px;
      color: #111827;
    }

    .meta-subtitle {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.35;
    }

    .hint {
      margin-top: 14px;
      color: var(--muted);
      font-size: 13px;
    }

    .selected {
      outline: 2px solid var(--accent);
      outline-offset: -2px;
      background: linear-gradient(180deg, #ffffff, #f8fbff);
    }

    @media (max-width: 960px) {
      .grid {
        grid-template-columns: 1fr;
      }
      .tab-card {
        min-height: 190px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>我的作品</h1>

    <section class="grid" aria-label="选项卡列表">
      <button class="tab-card selected" type="button" data-url-b64="aHR0cDovLzExOC4yNS42NS45MTo4MA==" aria-label="打开第一个链接">
        <div class="tab-preview">
            <img class="/zero_code.png" src="https://via.placeholder.com/1200x480.png?text=作品预览" alt="作品预览">
          </div>
        <div class="tab-meta">
          <div class="avatar">小</div>
          <div class="meta-text">
            <div class="meta-title">创建一个现代化的个人博客</div>
            <div class="meta-subtitle">点击打开</div>
          </div>
        </div>
      </button>

      <button class="tab-card" type="button" data-url-b64="aHR0cDovLzExOC4yNS42NS45MTo4MQ==" aria-label="打开第二个链接">
        <div class="tab-preview">
            <img class="/super_agent.png" src="https://via.placeholder.com/1200x480.png?text=作品预览" alt="作品预览">
          </div>
        <div class="tab-meta">
          <div class="avatar">小</div>
          <div class="meta-text">
            <div class="meta-title">做一个个人博客，要求用 v</div>
            <div class="meta-subtitle">点击打开</div>
          </div>
        </div>
      </button>

    </section>

    <div class="hint">说明：链接在页面里经过 Base64 编码后再解码跳转，不直接明文写出。</div>
  </main>

  <script>
    const cards = Array.from(document.querySelectorAll('.tab-card'));

    function decodeUrl(encoded) {
      return atob(encoded);
    }

    function setActive(card) {
      cards.forEach((item) => item.classList.remove('selected'));
      card.classList.add('selected');
    }

    cards.forEach((card) => {
      card.addEventListener('click', () => {
        setActive(card);
        const encoded = card.getAttribute('data-url-b64') || '';
        const url = decodeUrl(encoded);
        window.location.href = url;
      });
    });
  </script>
</body>
</html>
